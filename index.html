<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>三輪さん専用 基礎教科書アプリ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1eee6;
      --paper: #fffdf7;
      --ink: #172026;
      --muted: #667176;
      --line: #d8d3c8;
      --blue: #2368c5;
      --green: #1f7a55;
      --shadow: 0 18px 44px rgba(45, 39, 30, .12);
      --radius: 8px;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; min-width: 0; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.2)),
        repeating-linear-gradient(90deg, rgba(30,45,38,.026) 0 1px, transparent 1px 12px),
        var(--bg);
      line-height: 1.7;
    }

    main {
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 54px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      margin: 18px 0 26px;
      color: #2f3d42;
      font-size: 18px;
      font-weight: 700;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .app-card {
      min-height: 236px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,253,247,.88);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: var(--accent, var(--blue));
    }

    .app-card strong {
      display: block;
      font-size: 22px;
      line-height: 1.25;
    }

    .app-card p {
      color: var(--muted);
      margin: 10px 0 0;
      font-weight: 700;
    }

    .open {
      margin-top: 18px;
      min-height: 42px;
      border-radius: var(--radius);
      background: var(--ink);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .note {
      margin-top: 22px;
      padding: 14px;
      border: 1px dashed rgba(20, 83, 45, .35);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255,255,255,.7);
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .app-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 620px) {
      main { width: min(100% - 18px, 430px); }
      .app-grid { grid-template-columns: 1fr; }
      .app-card { min-height: 190px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>基礎教科書アプリ</h1>
    <p class="lead">
      三輪さん専用。仕事前に開いて、見て、触って、テストして、少しずつ基礎を固める入口。
    </p>

    <div class="app-grid">
      <a class="app-card" style="--accent:#2368c5" href="./sheet-metal-foundation/index.html">
        <span>
          <strong>板金基礎</strong>
          <p>板厚、曲げR、穴位置、加工NGを、実物図とシミュレーターで覚える。</p>
        </span>
        <span class="open">開く</span>
      </a>

      <a class="app-card" style="--accent:#1f7a55" href="./mechanical-design-foundation/mechanical-design-foundation-textbook.html">
        <span>
          <strong>機械設計 基礎</strong>
          <p>目的、構造、材料、加工、公差を設計判断として復習する。</p>
        </span>
        <span class="open">開く</span>
      </a>

      <a class="app-card" style="--accent:#7c3aed" href="./electrical-design-foundation/electrical-design-foundation-textbook.html">
        <span>
          <strong>電気設計 基礎</strong>
          <p>目次ホームにE01/E02をため、1枚ずつ読み、朝10分とE02実験で電圧・電流・抵抗を復習する。</p>
        </span>
        <span class="open">開く</span>
      </a>

      <a class="app-card" style="--accent:#b45309" href="./mechanics-cae-foundation/mechanics-cae-foundation-textbook.html">
        <span>
          <strong>力学とCAE</strong>
          <p>力、固定、荷重、応力、変形を、板金とCAEにつなげる。</p>
        </span>
        <span class="open">開く</span>
      </a>
    </div>

    <p class="note">
      スマホでは、開いたアプリをブラウザの共有メニューから「ホーム画面に追加」すると、1タップで復習できます。
    </p>
  </main>
</body>
</html>
